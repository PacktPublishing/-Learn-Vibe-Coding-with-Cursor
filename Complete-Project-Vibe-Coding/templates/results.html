<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resized Images - ZenvaResizer</title>
    <style>
        :root {
            --neon-pink: #ff2e88;
            --neon-blue: #00f3ff;
            --neon-purple: #9d00ff;
            --dark-bg: #0a0a0a;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--dark-bg);
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue),
                         0 0 20px var(--neon-blue),
                         0 0 30px var(--neon-blue);
            margin: 0;
            letter-spacing: 2px;
        }

        .tagline {
            color: var(--neon-pink);
            margin-top: 10px;
            font-size: 1.1em;
            opacity: 0.9;
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 20px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
        }

        .footer-links {
            margin: 10px 0;
        }

        .footer-links a {
            color: var(--neon-blue);
            text-decoration: none;
            margin: 0 10px;
            transition: all 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .image-container {
            margin: 30px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .image-container:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.3);
            transform: translateY(-2px);
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .download-link {
            display: inline-block;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-pink));
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.3);
        }

        .download-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.5);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 4px;
            background: rgba(0, 243, 255, 0.1);
        }

        .back-link:hover {
            color: var(--neon-pink);
            background: rgba(255, 46, 136, 0.1);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }

        .page-title {
            text-align: center;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue),
                         0 0 20px var(--neon-blue),
                         0 0 30px var(--neon-blue);
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1 class="logo">ZenvaResizer</h1>
        <p class="tagline">Transform your images with neon precision</p>
    </header>

    <div class="container">
        <a href="/" class="back-link">← Back to Upload</a>
        <h2 class="page-title">Resized Images</h2>
        
        {% for file in files %}
        <div class="image-container">
            <img src="{{ url_for('uploaded_file', filename=file) }}" alt="Resized image">
            <br>
            <a href="{{ url_for('uploaded_file', filename=file) }}" download class="download-link">Download</a>
        </div>
        {% endfor %}
    </div>

    <footer>
        <div class="footer-links">
            <a href="/">Home</a>
            <a href="https://github.com" target="_blank">GitHub</a>
            <a href="https://pillow.readthedocs.io" target="_blank">Pillow Docs</a>
        </div>
        <p>&copy; 2024 ZenvaResizer. All rights reserved.</p>
    </footer>
</body>
</html>
