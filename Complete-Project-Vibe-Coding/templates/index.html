<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer</title>
    <style>
        :root {
            --neon-pink: #ff2e88;
            --neon-blue: #00f3ff;
            --neon-purple: #9d00ff;
            --dark-bg: #0a0a0a;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--dark-bg);
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue),
                         0 0 20px var(--neon-blue),
                         0 0 30px var(--neon-blue);
            margin: 0;
            letter-spacing: 2px;
        }

        .tagline {
            color: var(--neon-pink);
            margin-top: 10px;
            font-size: 1.1em;
            opacity: 0.9;
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 20px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
        }

        .footer-links {
            margin: 10px 0;
        }

        .footer-links a {
            color: var(--neon-blue);
            text-decoration: none;
            margin: 0 10px;
            transition: all 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .form-group {
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .form-group:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.3);
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--neon-pink);
            font-weight: 500;
        }

        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--neon-blue);
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 10px;
        }

        input[type="number"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        input[type="file"] {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 4px;
            border: 1px dashed var(--neon-blue);
            color: #fff;
            width: 100%;
        }

        input[type="file"]::-webkit-file-upload-button {
            background: var(--neon-purple);
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            padding: 2px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--neon-blue);
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--neon-purple);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
        }

        button {
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-pink));
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.5);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }

        .watermark-controls {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .watermark-controls:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.3);
        }

        .watermark-controls h4 {
            color: var(--neon-blue);
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .preview-container {
            max-width: 300px;
            margin: 20px auto;
            position: relative;
        }

        .preview-image {
            max-width: 100%;
            border: 1px solid var(--neon-blue);
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .results {
            margin-top: 30px;
        }

        .results h3 {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 20px;
        }

        .download-btn {
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-pink));
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.5);
        }

        .opacity-value {
            color: var(--neon-pink);
            text-align: center;
            margin-top: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1 class="logo">ZenvaResizer</h1>
        <p class="tagline">Transform your images with neon precision</p>
    </header>

    <div class="container">
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="images">Select Images (Max 5)</label>
                <input type="file" id="images" name="images[]" multiple accept="image/*" required>
            </div>

            <div class="form-group">
                <label for="width">Width (px)</label>
                <input type="number" id="width" name="width" value="800" required>
            </div>

            <div class="form-group">
                <label for="height">Height (px)</label>
                <input type="number" id="height" name="height" value="600" required>
            </div>

            <div class="form-group">
                <label for="quality">Quality (1-100)</label>
                <input type="number" id="quality" name="quality" value="85" min="1" max="100" required>
            </div>

            <div class="form-group">
                <label for="rotation">Rotation (degrees)</label>
                <input type="number" id="rotation" name="rotation" value="0" min="0" max="360">
            </div>

            <div class="watermark-controls">
                <h4>Watermark Settings</h4>
                
                <div class="form-group">
                    <label for="watermark_text">Watermark Text</label>
                    <input type="text" id="watermark_text" name="watermark_text" placeholder="Enter watermark text">
                </div>

                <div class="form-group">
                    <label for="font_size">Font Size</label>
                    <input type="number" id="font_size" name="font_size" value="36" min="8" max="200">
                </div>

                <div class="form-group">
                    <label for="color">Color</label>
                    <input type="color" id="color" name="color" value="#ffffff">
                </div>

                <div class="form-group">
                    <label for="opacity">Opacity (0-255)</label>
                    <input type="range" id="opacity" name="opacity" min="0" max="255" value="128">
                    <div class="opacity-value" id="opacityValue">128</div>
                </div>

                <div class="form-group">
                    <label for="position">Position</label>
                    <select id="position" name="position">
                        <option value="center">Center</option>
                        <option value="top-left">Top Left</option>
                        <option value="top-right">Top Right</option>
                        <option value="bottom-left">Bottom Left</option>
                        <option value="bottom-right">Bottom Right</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="watermark_rotation">Watermark Rotation (degrees)</label>
                    <input type="number" id="watermark_rotation" name="watermark_rotation" value="0" min="0" max="360">
                </div>

                <div class="form-group">
                    <label for="padding">Padding (px)</label>
                    <input type="number" id="padding" name="padding" value="20" min="0" max="100">
                </div>
            </div>

            <button type="submit">Process Images</button>
        </form>

        <div id="results" class="results"></div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="/">Home</a>
            <a href="https://github.com" target="_blank">GitHub</a>
            <a href="https://pillow.readthedocs.io" target="_blank">Pillow Docs</a>
        </div>
        <p>&copy; 2025 ZenvaResizer. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('opacity').addEventListener('input', function() {
            document.getElementById('opacityValue').textContent = this.value;
        });

        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const color = document.getElementById('color').value;
            formData.set('color', `${parseInt(color.substr(1,2), 16)},${parseInt(color.substr(3,2), 16)},${parseInt(color.substr(5,2), 16)}`);

            fetch('/upload', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const resultsDiv = document.getElementById('results');
                    resultsDiv.innerHTML = '<h3>Processed Images:</h3>';
                    data.files.forEach(file => {
                        resultsDiv.innerHTML += `
                            <div class="form-group">
                                <img src="/uploads/${file}" class="preview-image" alt="Processed image">
                                <a href="/uploads/${file}" download class="download-btn">Download</a>
                            </div>
                        `;
                    });
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while processing the images.');
            });
        });
    </script>
</body>
</html>
